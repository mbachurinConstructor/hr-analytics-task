services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: hr_analytics
    ports:
      - "5433:5432"
    volumes:
      - ./schema:/docker-entrypoint-initdb.d/01_schema
      - ./data:/docker-entrypoint-initdb.d/02_data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 5s
      retries: 5